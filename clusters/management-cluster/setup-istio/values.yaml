---
# Cluster-specific topology is restated here explicitly (even where equal to
# chart defaults) so the mesh configuration is readable from this repo alone.
setup-istio:
  istio:
    # Pin the control plane version explicitly if needed, e.g. v1.26.4.
    # Empty string = operator default.
    version: ''

    # Namespaces that are part of the mesh (items are ORed).
    # Application namespaces join by being labeled istio-discovery=enabled.
    discoverySelectors:
      - matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - istio-system
              - istio-cni
              - istio-csr
              - openshift-ingress
      - matchLabels:
          istio-discovery: enabled

    # Trace export: OTLP to the OpenTelemetry Collector (local template below),
    # which authenticates against the multitenant TempoStack gateway. Sampling
    # is configured via the Telemetry resource below.
    values:
      meshConfig:
        enableTracing: true
        extensionProviders:
          - name: otel
            opentelemetry:
              port: 4317
              service: otel-collector.istio-system.svc.cluster.local

  # Mesh-wide Telemetry resource: export traces through the otel extensionProvider
  # and expose Envoy metrics to platform user-workload monitoring.
  telemetry:
    enabled: true
    tracing:
      - providers:
          - name: otel
        randomSamplingPercentage: 100
    metrics:
      - providers:
          - name: prometheus

  # Certificate signing is delegated to cert-manager via the istio-csr agent.
  # The Issuer istio-ca (namespace istio-system) is created by the cert-manager app.
  istiocsr:
    enabled: true
    istioCSRConfig:
      certManager:
        issuerRef:
          name: istio-ca
          kind: Issuer
          group: cert-manager.io
      istiodTLSConfig:
        trustDomain: cluster.local
      istio:
        namespace: istio-system

  # Mesh-wide mTLS. STRICT is the PoC requirement.
  peerauthentication:
    mtls:
      mode: STRICT

# OpenTelemetry Collector (local template) bridging the mesh to the multitenant
# TempoStack gateway. Envoy sidecars cannot authenticate against the gateway
# themselves and the distributor only accepts traffic from the gateway
# (operator NetworkPolicy), so the collector receives plain OTLP from the mesh
# and forwards it with its ServiceAccount token (tenant header + service-ca TLS).
collector:
  enabled: true
  name: otel
  namespace: istio-system
  syncwave: '5'
  replicas: 1
  tenant: mesh
  gateway:
    service: tempo-simplest-gateway.tempostack.svc.cluster.local
    port: 8090
