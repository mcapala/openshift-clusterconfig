---
namespace:
  name: bookinfo
  descr: "Istio bookinfo demo application"
  syncwave: '0'

# HTTPRoute exposing productpage through the Gateway API gateway in openshift-ingress.
# Enable once the gateway (setup-gateway-api) exists.
httproute:
  enabled: true
  name: bookinfo
  syncwave: '2'
  hostname: bookinfo.mcapala.com
  # Gateway scenario toggle: mesh-owned (mesh-gateway/istio-ingress) vs
  # ingress-operator (gateway/openshift-ingress) — see handbook "Scenario toggles".
  gateway:
    name: mesh-gateway
    namespace: istio-ingress
  backend:
    name: productpage
    port: 9080

# Traffic management (DestinationRules + VirtualServices).
trafficManagement:
  enabled: true
  syncwave: '3'
  reviews:
    # Canary: weighted split across subsets; edit weights to promote/rollback.
    subsets:
      - v1
      - v2
      - v3
    weights:
      - subset: v1
        weight: 90
      - subset: v3
        weight: 10
  ratings:
    timeout: 2s
    retries:
      attempts: 3
      perTryTimeout: 500ms
      retryOn: 5xx,connect-failure
    connectionPool:
      http1MaxPendingRequests: 32
      http2MaxRequests: 128
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50

# Authorization: default-deny + explicit allows per call path. Principals are
# ServiceAccount-derived SPIFFE identities.
authorizationPolicies:
  enabled: true
  syncwave: '4'
  # Gateway scenario toggle: identity of the ingress gateway allowed to reach
  # productpage. Mesh-owned: istio-ingress/mesh-gateway-istio. Ingress-operator
  # scenario: openshift-ingress/gateway-... (see handbook "Scenario toggles").
  gatewayPrincipal: ocp.mcapala.local/ns/istio-ingress/sa/mesh-gateway-istio
  allows:
    - name: allow-gateway-to-productpage
      to:
        app: productpage
      fromPrincipals:
        - gatewayPrincipal   # resolved to .gatewayPrincipal by the template
      methods:
        - GET
        - POST               # productpage /login and /logout are POSTs
    - name: allow-productpage-to-details
      to:
        app: details
      fromPrincipals:
        - ocp.mcapala.local/ns/bookinfo/sa/bookinfo-productpage
      methods:
        - GET
    - name: allow-productpage-to-reviews
      to:
        app: reviews
      fromPrincipals:
        - ocp.mcapala.local/ns/bookinfo/sa/bookinfo-productpage
      methods:
        - GET
    - name: allow-reviews-to-ratings
      to:
        app: ratings
      fromPrincipals:
        - ocp.mcapala.local/ns/bookinfo/sa/bookinfo-reviews
      methods:
        - GET
