---
namespace:
  name: bookinfo
  descr: "Istio bookinfo demo application"
  syncwave: '0'

# HTTPRoute exposing productpage through the Gateway API gateway in openshift-ingress.
# Enable once the gateway (setup-gateway-api) exists.
httproute:
  enabled: true
  name: bookinfo
  syncwave: '2'
  hostname: bookinfo.mcapala.com
  # Gateway scenario toggle: mesh-owned (mesh-gateway/istio-ingress) vs
  # ingress-operator (gateway/openshift-ingress) — see handbook "Scenario toggles".
  gateway:
    name: mesh-gateway
    namespace: istio-ingress
  backend:
    name: productpage
    port: 9080
