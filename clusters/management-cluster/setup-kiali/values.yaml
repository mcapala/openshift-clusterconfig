---
# Cluster-specific topology is restated here explicitly (even where equal to
# chart defaults) so the Kiali configuration is readable from this repo alone.
setup-kiali:
  kiali:
    namespace: istio-system
    deployment:
      cluster_wide_access: true
      view_only_mode: false
      # Namespaces Kiali watches - mirrors the Istio discoverySelectors (setup-istio).
      discovery_selectors:
        - matchLabels:
            istio-discovery: enabled
        - matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: In
              values:
                - istio-system
                - istio-cni
                - openshift-ingress

    external_services:
      # Distributed tracing: query the TempoStack gateway (tenant mesh) with the
      # Kiali ServiceAccount token (openshift tenancy mode).
      tracing:
        enabled: true
        provider: tempo
        use_grpc: false
        internal_url: https://tempo-simplest-gateway.tempostack.svc.cluster.local:8080/api/traces/v1/mesh/tempo
        auth:
          type: bearer
          use_kiali_token: true

      # Perses dashboards deployed by the COO monitoring UIPlugin. With the COO,
      # url_format "openshift" is required, external_url is the console URL
      # without a path and internal_url stays unset so Kiali skips the internal
      # dashboard validation and builds console links client-side.
      perses:
        enabled: true
        external_url: https://console-openshift-console.apps.ocp.mcapala.com
        url_format: openshift
        # Perses project = namespace holding the PersesDashboard CRs
        # (setup-cluster-observability-operator vendors them there).
        project: perses-dashboards
        # No direct Kiali->Perses queries (internal_url unset), links only.
        auth:
          type: none
          use_kiali_token: false
        dashboards:
          - name: "Istio Service Dashboard"
            variables:
              datasource: var-datasource
              namespace: var-namespace
              service: var-service
              version: var-version
          - name: "Istio Workload Dashboard"
            variables:
              datasource: var-datasource
              namespace: var-namespace
              version: var-version
              workload: var-workload
          - name: "Istio Mesh Dashboard"
            variables:
              datasource: var-datasource
              namespace: var-namespace
              workload: var-workload
          - name: "Istio Ztunnel Dashboard"
            variables:
              namespace: var-namespace
              workload: var-workload

  # OpenShift Service Mesh Console plugin: mesh visibility in the web console.
  ossmconsole:
    enabled: true

  monitoring:
    # Enable the openshift-ingress monitors when the Gateway API gateway (phase 2) exists.
    namespaces:
      - name: istio-system
        enabled: true
      - name: openshift-ingress
        enabled: true
      - name: bookinfo
        enabled: true
