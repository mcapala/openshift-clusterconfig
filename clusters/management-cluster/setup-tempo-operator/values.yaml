---
tempo: &channel-tempo stable
tempo-namespace: &tempo-namespace openshift-tempo-operator
bucketname: &bucketname tempo-bucket
tempo-secret: &tempo-secret-name tempo-s3
tempostack-namespace: &tempostack-namespace tempostack

tempo-tracing:
  tempostack:
    enabled: true
    name: simplest

    managementState: Managed

    namespace:
      create: true
      name: *tempostack-namespace
      descr: "Namespace for the TempoStack"
      display: "TempoStack"
      additionalAnnotations: {}
      additionalLabels: {}

    storage:
      secret:
        name: tempo-s3
        type: s3
        credentialMode: static

    storageSize: 50Gi
    replicationFactor: 1
    serviceAccount: tempo-simplest

    tenants:
      mode: openshift
      enabled: true

      authentication:
        - tenantName: 'mesh'
          tenantId: '1610b0c3-c509-4592-a256-a1871353dbfe'
          permissions:
            - write
            - read

    observability:
      enabled: true

      tracing:
        jaeger_agent_endpoint: 'localhost:6831'
        otlp_http_endpoint: 'http://localhost:4320'

    template:
      gateway:
        enabled: true
        rbac: false

        ingress:
          type: 'route'
          termination: 'reencrypt'
        component:
          replicas: 1

      queryFrontend:
        jaegerQuery:
          enabled: true
        component:
          replicas: 1

# ObjectBucketClaim for the TempoStack S3 storage (local template).
# Uses the default noobaa bucket class - no dedicated BackingStore/pv-pool.
objectstorage:
  enabled: true
  syncwave: '2'
  bucket:
    name: *bucketname
    namespace: *tempostack-namespace
    storageclass: openshift-storage.noobaa.io
    bucketclass: noobaa-default-bucket-class

# ClusterRoleBinding allowing all ServiceAccounts (Envoy sidecars/istiod) to write
# traces through the TempoStack gateway (tenant RBAC, mode openshift).
# The ClusterRole simplest-traces-write is created by the tempo-tracing chart.
traceswriter:
  enabled: true
  syncwave: '3'
  clusterrole: simplest-traces-write

######################################
# SUBCHART: helper-operator
# Operators that shall be installed.
######################################
helper-operator:
  operators:
    tempo-operator:
      enabled: true
      namespace:
        name: *tempo-namespace
        create: true
      subscription:
        channel: *channel-tempo
        approval: Automatic
        operatorName: tempo-product
        source: redhat-operators
        sourceNamespace: openshift-marketplace
      operatorgroup:
        create: true
        notownnamespace: true

########################################
# SUBCHART: helper-status-checker
# Verify the status of a given operator.
########################################
helper-status-checker:
  enabled: true

  approver: false

  checks:
    - operatorName: tempo-operator
      namespace:
        name: *tempo-namespace
      syncwave: 1

      serviceAccount:
        name: "status-checker-tempo"

##############################################
# SUBCHART: helper-odf-bucket-secret
# Creates the Secret that Tempo requires from
# the OBC Secret and ConfigMap.
##############################################
helper-odf-bucket-secret:
  enabled: true
  syncwave: 3
  namespace: *tempostack-namespace
  secretname: *tempo-secret-name

  bucket:
    name: *bucketname

  keys:
    access_key_id: access_key_id
    access_key_secret: access_key_secret
    bucket: bucket
    endpoint: endpoint
    region: region

  set_region: false
