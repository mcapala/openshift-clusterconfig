---

# Install Operator Compliance Operator
# Deploys Operator --> Subscription and Operatorgroup
# Syncwave: 0
helper-operator:
  operators:
    cert-manager-operator:
      enabled: true
      syncwave: '0'
      namespace:
        name: cert-manager-operator
        create: true
      subscription:
        channel: stable-v1
        approval: Automatic
        operatorName: openshift-cert-manager-operator
        source: redhat-operators
        sourceNamespace: openshift-marketplace
      operatorgroup:
        create: true
        notownnamespace: false

helper-status-checker:
  enabled: true

  checks:
    - operatorName: cert-manager-operator
      namespace:
        name: cert-manager-operator
      serviceAccount:
        name: "status-checker-cert-manager"


#########################################################
# CERT-Manager configuration
#########################################################
# Configure/patch the default cert-amanger instance and add unsupported configuration.
# The Auto-Approver controller must be disabled, to approver policy can be used.
cert-manager:
  certManager:
    enable_patch: true

    syncwave: '10'

    # unsupportedConfigOverrides:
    #   controller:
    #     args:
    #       - '--controllers=*,-certificaterequests-approver'

    overrideArgs:
      enabled: true
      args:
        - '--dns01-recursive-nameservers-only'
        - --dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53

  issuer:
    - name: letsencrypt-prod
      type: ClusterIssuer
      enabled: true
      syncwave: 20

      acme:
        email: michi0987@gmail.com

        solvers:
          - dns01:
              cloudflare:
                apiTokenSecretRef:
                  name: cloudflare-api-token-secret
                  key: api-token
            selector:
              dnsZones:
                - mcapala.com

    # --- Shared root CA hierarchy for service mesh + Gateway API ---
    # Bootstrap self-signed ClusterIssuer, only used to create the root CA.
    - name: selfsigned-root
      type: ClusterIssuer
      enabled: true
      syncwave: 20

      selfSigned: true

    # Root issuer: signs the mesh and gateway intermediate CAs.
    # PoC root; replace with a trusted CA for production.
    - name: root-issuer
      type: ClusterIssuer
      enabled: true
      syncwave: 22

      ca:
        secretName: root-ca-key-pair

    # Mesh intermediate issuer, consumed by the istio-csr agent (IstioCSR CR in setup-istio).
    - name: istio-ca
      type: Issuer
      namespace: istio-system
      enabled: true
      syncwave: 24

      ca:
        secretName: istio-ca

  certificates:
    enabled: true
    certificate:
      # Root CA. Secret must live in the cluster-resource namespace (cert-manager)
      # so ClusterIssuer root-issuer can read it.
      - name: root-ca
        enabled: true
        namespace: cert-manager
        syncwave: '21'
        isCA: true
        secretName: root-ca-key-pair
        commonName: root-ca
        duration: 87600h
        privateKey:
          algorithm: ECDSA
          size: 256
        subject:
          organizations:
            - ocp.mcapala.local
            - cert-manager
        issuerRef:
          name: selfsigned-root
          kind: ClusterIssuer

      # Service mesh intermediate CA (used by istio-csr via Issuer istio-ca).
      - name: istio-ca
        enabled: true
        namespace: istio-system
        syncwave: '23'
        isCA: true
        secretName: istio-ca
        commonName: istio-ca
        duration: 87600h
        privateKey:
          algorithm: ECDSA
          size: 256
        subject:
          organizations:
            - ocp.mcapala.local
            - cert-manager
        issuerRef:
          name: root-issuer
          kind: ClusterIssuer

      # Gateway API intermediate CA: secret `cacerts` in openshift-ingress is picked up
      # by the ingress-operator managed istiod. Only needed for the ingress-operator
      # gateway scenario (gateway/openshift-ingress) — disabled while that scenario is idle.
      - name: gateway-ca
        enabled: false
        namespace: openshift-ingress
        syncwave: '23'
        isCA: true
        secretName: cacerts
        commonName: gateway-ca
        duration: 87600h
        privateKey:
          algorithm: ECDSA
          size: 256
        subject:
          organizations:
            - ocp.mcapala.local
            - cert-manager
        issuerRef:
          name: root-issuer
          kind: ClusterIssuer

      # HTTPS listener certificate for the Gateway API gateway (bookinfo).
      - name: bookinfo-tls
        enabled: false
        namespace: openshift-ingress
        syncwave: '25'
        secretName: bookinfo-tls
        dnsNames:
          - bookinfo.mcapala.com
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer

      # HTTPS listener certificate for the mesh-owned gateway (istio-ingress).
      # Peer entry to the openshift-ingress one above — exactly one is enabled
      # at a time (gateway scenario toggle).
      - name: bookinfo-tls
        enabled: true
        namespace: istio-ingress
        syncwave: '25'
        secretName: bookinfo-tls
        dnsNames:
          - bookinfo.mcapala.com
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer

#########################################################
# CERT-Manager Approver Policy Deployment (extra chart)
#########################################################
cert-manager-approver-policy:

  crds:
    # This option decides if the CRDs should be installed
    # as part of the Helm installation.
    enabled: true
    # This option makes it so that the "helm.sh/resource-policy": keep
    # annotation is added to the CRD. This will prevent Helm from uninstalling
    # the CRD when the Helm release is uninstalled.
    # WARNING: when the CRDs are removed, all cert-manager-approver-policy custom resources
    # (CertificateRequestPolicy) will be removed too by the garbage collector.
    keep: true

  # Number of replicas of approver-policy to run.
  replicaCount: 1

  image:
    # Target image repository.
    repository: quay.io/jetstack/cert-manager-approver-policy
    # Kubernetes imagePullPolicy on Deployment.
    pullPolicy: IfNotPresent
    tag: v0.23.0@sha256:ee9eb713ff1462187b07280772c6139afc4a2f0eab3d5aec7e461217279d7a61

  app:
    # The format of approver-policy logging. Accepted values are text or json.
    logFormat: text
    # Verbosity of approver-policy logging. This is a value from 1 to 5.
    logLevel: 1

    # List of signer names that approver-policy will be given permission to
    # approve and deny. CertificateRequests referencing these signer names can be
    # processed by approver-policy. Defaults to an empty array, allowing approval
    # for all signers.
    approveSignerNames:
      - 'issuers.cert-manager.io/*'
      - 'clusterissuers.cert-manager.io/*'

  # The nodeSelector on Pods tells Kubernetes to schedule Pods on the nodes with
  # matching labels.
  # nodeSelector:
  #   node-role.kubernetes.io/infra: ''

  # Tolerations ... placing on infra nodes
  tolerations: []
#    - effect: NoSchedule
#      key: node-role.kubernetes.io/infra
#      operator: Equal
#      value: reserved
#    - effect: NoExecute
#      key: node-role.kubernetes.io/infra
#      operator: Equal
#      value: reserved

#########################################################
# CERT-Manager Approver Policy Configuration
#########################################################
role: cert-manager-policy:global-approver
serviceAccount: cert-manager
cert_manager_Namespace: cert-manager

policies:
  - name: my-approver-policy
    enabled: false

    allowed:

      commonName:
        required: false
        value: "*"
        validations: []
      dnsNames:
        required: true
        values:
          - "*"
        validations: []
      ipAddresses:
        required: false
        values: ["*"]
        validations: []
      uris:
        required: false
        values:
          - "*"
        validations: []
      emailAddresses:
        required: false
        values:
          - "*"
        validations: []

      # isCA: false
      subject:
        organizations:
          required: true
          values:
            - "MyOrganization"
          validations:
            - rule: self.matches("MyOrganization")
              message: Organization must be MyOrganization
        countries:
          required: true
          values:
            - AT
          validations:
            - rule: self.matches("AT")
              message: Country code must be AT
      usages:
        - "server auth"
        - "client auth"

    constraints:
      minDuration: 1h
      maxDuration: 24h
      privateKey:
        algorithm: RSA
        minSize: 2048
        maxSize: 4096

    selector:
      issuerRef: {}
